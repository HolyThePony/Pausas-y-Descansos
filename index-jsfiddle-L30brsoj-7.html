<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checklist de Pausas</title>

  <style>
    :root {
  --bg: #0f1115;
  --card: #171a21;
  --primary: #4fa3ff;
  --primary-soft: rgba(79, 163, 255, 0.25);
  --text: #e8eaf0;
  --muted: #9aa0b3;
  --border: #262a35;
  --success: #4caf50;
}

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #141824, var(--bg));
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px;
}

.container {
  width: 100%;
  max-width: 1200px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: var(--primary);
}

/* ===== LAYOUT SIEMPRE HORIZONTAL ===== */
.layout {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.3fr);
  gap: 20px;
  height: calc(100vh - 140px);
}

/* ===== CARDS ===== */
.card {
  background: linear-gradient(180deg, #1b1f2b, var(--card));
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== INPUT ===== */
label {
  margin-bottom: 8px;
  color: var(--muted);
}

textarea {
  flex: 1;
  width: 100%;
  background-color: #11131a;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  resize: none;
}

textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-soft);
}

.hint {
  font-size: 0.85em;
  color: var(--muted);
  margin-top: 8px;
}

button {
  margin-top: 12px;
  padding: 12px;
  background: linear-gradient(135deg, #4fa3ff, #6bc1ff);
  color: #0a0d14;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
}

button:active {
  transform: scale(0.97);
}

/* ===== CHECKLIST ===== */
.checklist-card {
  overflow-y: auto;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.pause-item {
  display: flex;
  align-items: center;
  padding: 12px 6px;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
}

.pause-item:last-child {
  border-bottom: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.pause-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ===== CHECKBOX ===== */
input[type="checkbox"] {
  appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--muted);
  cursor: pointer;
}

input[type="checkbox"]:checked {
  background-color: var(--primary);
  border-color: var(--primary);
}

input[type="checkbox"]:checked::after {
  content: "";
  position: relative;
  left: 7px;
  top: 2px;
  width: 5px;
  height: 10px;
  border: solid #0a0d14;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

/* ===== TEXTO ===== */
.pause-title {
  font-weight: 600;
}

.pause-time {
  font-size: 0.9em;
  color: var(--muted);
}

.completed {
  text-decoration: line-through;
  color: var(--success);
}
  </style>

  
</head>
<body>
  <div class="container">
  <h1>Checklist de Pausas y Descansos</h1>

  <div class="layout">
    <!-- IZQUIERDA -->
    <div class="card input-card">
      <label for="inputPausas">Introduce tus pausas</label>

      <textarea
        id="inputPausas"
        placeholder="Pausa
15:45:00 - 15:50:00

Descanso 19:10:00 - 19:30:00"
      ></textarea>

      <div class="hint">
        Formatos soportados:
        <br>• Pausa 15:45:00 - 15:50:00
        <br>• Pausa (15:45:00 - 15:50:00)
        <br>• Pausa ⏎ 15:45:00 - 15:50:00
      </div>

      <button id="btnGenerar">Generar checklist</button>
    </div>

    <!-- DERECHA -->
    <div class="card checklist-card">
      <ul id="listaPausas"></ul>
    </div>
  </div>
</div>

  <script>
    const inputPausas = document.getElementById("inputPausas");
const listaPausas = document.getElementById("listaPausas");
const btnGenerar = document.getElementById("btnGenerar");

btnGenerar.addEventListener("click", generarChecklist);

function generarChecklist() {
  const texto = inputPausas.value.trim();
  listaPausas.innerHTML = "";
  if (!texto) return;

  const rawLines = texto
    .split("\n")
    .map(l => l.trim())
    .filter(Boolean);

  const lines = [];

  for (let i = 0; i < rawLines.length; i++) {
    const curr = rawLines[i];
    const next = rawLines[i + 1];

    if (
      next &&
      !curr.match(/\d{2}:\d{2}:\d{2}/) &&
      /^\d{2}:\d{2}:\d{2}\s*-\s*\d{2}:\d{2}:\d{2}$/.test(next)
    ) {
      lines.push(`${curr} ${next}`);
      i++;
    } else {
      lines.push(curr);
    }
  }

  const pausas = lines
    .map((line, index) => {
      const match = line.match(
        /(.+?)\s*\(?\s*(\d{2}:\d{2}:\d{2})\s*-\s*(\d{2}:\d{2}:\d{2})\s*\)?/
      );
      if (!match) return null;

      return {
        id: `pausa_${index}`,
        nombre: match[1],
        inicio: match[2],
        fin: match[3]
      };
    })
    .filter(Boolean);

  localStorage.setItem("pausas_config", JSON.stringify(pausas));
  renderizarPausas(pausas);
}

function renderizarPausas(pausas) {
  const estado = JSON.parse(localStorage.getItem("pausas_estado") || "{}");
  listaPausas.innerHTML = "";

  pausas.forEach(pausa => {
    const li = document.createElement("li");
    li.className = "pause-item";

    const info = document.createElement("div");
    info.className = "pause-info";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = estado[pausa.id] || false;

    const text = document.createElement("div");
    text.innerHTML = `
      <div class="pause-title ${checkbox.checked ? "completed" : ""}">
        ${pausa.nombre}
      </div>
      <div class="pause-time">
        ${pausa.inicio} - ${pausa.fin}
      </div>
    `;

    checkbox.addEventListener("change", () => {
      estado[pausa.id] = checkbox.checked;
      localStorage.setItem("pausas_estado", JSON.stringify(estado));
      text.querySelector(".pause-title")
        .classList.toggle("completed", checkbox.checked);
    });

    info.appendChild(checkbox);
    info.appendChild(text);
    li.appendChild(info);
    listaPausas.appendChild(li);
  });
}

(function cargar() {
  const pausas = JSON.parse(localStorage.getItem("pausas_config") || "[]");
  if (pausas.length) renderizarPausas(pausas);
})();
  </script>
</body>
</html>
